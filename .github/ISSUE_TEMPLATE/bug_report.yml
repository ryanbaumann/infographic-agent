name: Bug Report
description: Report a bug to help improve Infographic Architect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of the bug
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the app
        2. Click on...
        3. Enter...
        4. Bug occurs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
      description: What should have happened vs what did happen?
      placeholder: |
        Expected: The infographic should generate
        Actual: Error message appears instead
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: Browser version and operating system
      placeholder: "Chrome 120.0 on macOS 14.2"
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Any errors from the browser console (F12 → Console tab)?
      placeholder: "Paste any error messages or stack traces"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: "Screenshots, API key issues, network problems, etc."
